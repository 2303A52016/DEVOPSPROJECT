name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_HOST: localhost
      PG_PORT: 5432
      PG_DATABASE: lifeweb
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lifeweb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d lifeweb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Show repository structure
      run: |
        find . -maxdepth 2 | sort

    - name: Setup Node.js for backend
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Initialize backend database schema
      run: |
        cd backend
        npm run db:init

    - name: Run backend tests
      run: |
        cd backend
        if [ -f package.json ] && grep -q '"test"' package.json; then
          npm test
        else
          echo "No tests defined"
        fi

    - name: Setup Node.js for frontend
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Build React App
      run: |
        cd frontend
        npm run build

    - name: Post Setup Node
      run: echo "Post Setup Node"

    - name: Post Checkout Code
      run: echo "Post Checkout Code"

    - name: Complete job
      run: echo "Complete job"
