name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Show repository structure
      run: |
        find . -maxdepth 2 | sort

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Run backend tests
      run: |
        cd backend
        if [ -f package.json ] && grep -q '"test"' package.json; then
          npm test
        else
          echo "No tests defined"
        fi

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Build React App
      run: |
        cd frontend
        npm run build

    - name: Post Setup Node
      run: echo "Post Setup Node"

    - name: Post Checkout Code
      run: echo "Post Checkout Code"

    - name: Complete job
      run: echo "Complete job"
